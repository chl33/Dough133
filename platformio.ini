; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs =
	      secrets.ini
	      secrets-usb.ini
;	      secrets-ota.ini

[env:node32s]
platform = espressif32
framework = arduino
board = esp32dev # node32s
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv
monitor_speed = 115200
check_tool = clangtidy
monitor_filters = esp32_exception_decoder
;build_type = debug
build_type = release
extra_scripts = pre:build_svelte.py
lib_deps =
	symlink://../og3
	symlink://../og3x-oled
	symlink://../og3x-shtc3
#	chl33/og3@^0.4.4
#	chl33/og3x-oled@^0.3.1
#	chl33/og3x-shtc3@^0.3.0
	adafruit/Adafruit BusIO
	adafruit/Adafruit Unified Sensor
	adafruit/Adafruit SHTC3 Library
	bakercp/CRC32
	bblanchon/ArduinoJson@^7.0.0
	heman/AsyncMqttClient-esphome@^2.1.0
	elims/PsychicMqttClient@^0.2.4
	hoeken/PsychicHttp@^2.1.1
	thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1
	Wire
	SPI
	WiFi

build_flags =
	'-Wall'
	'-D OTA_PASSWORD="${secrets.otaPassword}"'
;	'-D LOG_DEBUG'
	'-D LOG_UDP'
	'-D WIFI_OLED'
	'-D LOG_UDP_ADDRESS=${secrets.udpLogTarget}'

upload_protocol = ${secrets.uploadProtocol}
upload_port = ${secrets.uploadPort}
upload_flags =
	${secrets.uploadAuth}
	${secrets.uploadHostPort}
lib_ldf_mode = chain
lib_compat_mode = strict
