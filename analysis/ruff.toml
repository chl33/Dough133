line-length = 100

[lint]
# PLC, PLE, PLW
select = [
    "ALL",
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
    # Ruff-specific rules
    "RUF",
    # Pylint rules
    "PLC",
    "PLE",
    "PLW",
]

[format]
docstring-code-format = true
